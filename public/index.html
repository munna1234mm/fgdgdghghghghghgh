<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite BIN Generator | Advanced Card Generation API</title>
    <meta name="description" content="Generate high-quality valid credit card numbers with our advanced BIN generation API. Fast, secure, and reliable.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="container">
        <header>
            <h1 class="glow-text">ELITE<span>BIN</span></h1>
            <p class="subtitle">Next-Generation Card Generation Engine</p>
        </header>

        <section class="generator-box">
            <div class="input-group">
                <label for="binInput">Enter BIN Prefix</label>
                <div class="input-wrapper">
                    <input type="text" id="binInput" placeholder="e.g. 515234" maxlength="16">
                    <div class="input-highlight"></div>
                </div>
            </div>

            <div class="controls">
                <div class="input-group mini">
                    <label for="amountInput">Quantity</label>
                    <input type="number" id="amountInput" value="10" min="1" max="1000">
                </div>
                <button id="generateBtn" class="primary-btn">
                    <span class="btn-text">GENERATE</span>
                    <span class="btn-glow"></span>
                </button>
            </div>

            <div class="results-container">
                <div class="results-header">
                    <h3>Generated Cards</h3>
                    <div class="actions">
                        <button id="copyBtn" class="icon-btn" title="Copy All">📋 Copy</button>
                        <button id="downloadBtn" class="icon-btn" title="Download TXT">📥 Download</button>
                    </div>
                </div>
                <div class="results-area">
                    <textarea id="outputArea" readonly placeholder="Generator results will appear here..."></textarea>
                </div>
            </div>
        </section>

        <section class="api-docs">
            <h2>API Usage</h2>
            <div class="code-block">
                <code>GET /api/gen?bin={BIN}&amount={10}</code>
            </div>
        </section>
        
        <footer class="footer">
            <p>&copy; 2026 EliteBIN Engine. For educational purposes only.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
